name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 0 * * 1" # Monday
    - cron: "0 0 * * 3" # Wednesday
    - cron: "0 0 * * 5" # Friday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      # See CUSTOMIZE.md for details on how to set up PAT for triggering subsequent workflows
      #        with:
      #          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          echo "đź”§ Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save current citations.yml hash
        id: before
        run: |
          echo "đź“¦ Checking existing citations.yml hash..."
          if [ -f _data/citations.yml ]; then
            sha_before=$(sha256sum _data/citations.yml | awk '{print $1}')
            echo "sha_before=$sha_before" >> $GITHUB_OUTPUT
            echo "đź“ť SHA before: $sha_before"
          else
            echo "sha_before=none" >> $GITHUB_OUTPUT
            echo "đź“ť No existing citations.yml file found."
          fi

      - name: Run citation update script
        id: run_citation_update
        # Google Scholar blocks GitHub's datacenter IPs, so this scrape will
        # usually time out (exit 124) when run from CI. We tolerate that here
        # instead of failing the whole job: if it can't fetch, the existing
        # _data/citations.yml is kept unchanged. To refresh citations reliably,
        # run `python bin/update_scholar_citations.py` locally (see CUSTOMIZE.md).
        continue-on-error: true
        shell: bash
        run: |
          set +e
          status=1
          for attempt in 1 2; do
            echo "đźš€ Running citation update script (attempt $attempt/2)..."
            start_time=$(date)
            timeout 120 python bin/update_scholar_citations.py
            status=$?
            end_time=$(date)
            if [ $status -eq 0 ]; then
              echo "âś… Citation update succeeded (started at $start_time, ended at $end_time)."
              echo "âś… Citation update succeeded on attempt $attempt." >> $GITHUB_STEP_SUMMARY
              break
            fi
            echo "âťŚ Attempt $attempt failed with exit code $status (started at $start_time, ended at $end_time)."
            if [ $attempt -lt 2 ]; then
              sleep 15
            fi
          done
          if [ $status -ne 0 ]; then
            echo "âš ď¸Ź Citation scrape failed (likely Scholar blocking the runner). Keeping existing citations.yml." >> $GITHUB_STEP_SUMMARY
          fi
          set -e

      - name: Validate citations.yml structure
        run: |
          echo "đź§Ş Validating citations.yml structure..."
          python - <<'EOF'
          import sys, yaml

          with open("_data/citations.yml") as f:
              data = yaml.safe_load(f)
          if not data or not isinstance(data.get("papers"), dict) or not data["papers"]:
              print("âťŚ citations.yml has no valid 'papers' section; refusing to commit a likely broken scrape.")
              sys.exit(1)
          print(f"âś… citations.yml is valid with {len(data['papers'])} paper(s).")
          EOF

      - name: Save new citations.yml hash
        id: after
        run: |
          echo "đź”Ť Checking updated citations.yml hash..."
          if [ -f _data/citations.yml ]; then
            sha_after=$(sha256sum _data/citations.yml | awk '{print $1}')
            echo "sha_after=$sha_after" >> $GITHUB_OUTPUT
            echo "đź“ť SHA after: $sha_after"
          else
            echo "sha_after=none" >> $GITHUB_OUTPUT
            echo "đź“ť citations.yml was not created or is missing."
          fi

      - name: Report citations.yml change in summary
        run: |
          echo "đź“‹ Comparing citation file hashes..."
          if [ "${{ steps.before.outputs.sha_before }}" != "${{ steps.after.outputs.sha_after }}" ]; then
            echo "âś… _data/citations.yml was updated."
            echo "âś… _data/citations.yml was updated." >> $GITHUB_STEP_SUMMARY
          else
            echo "â„ąď¸Ź _data/citations.yml was not changed."
            echo "â„ąď¸Ź _data/citations.yml was not changed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure Git
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          echo "đź”§ Git configured."

      - name: Commit and push if changed
        run: |
          git add _data/citations.yml
          git diff --staged --quiet || (
            echo "đź“¤ Committing and pushing changes..."
            git commit -m "Update Google Scholar citations"
            git push
          )
