<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Structured pruning accuracy across neuron sparsity</title>
  <desc id="desc">Uniform-crossover genetic search retains the highest test accuracy at severe neuron sparsity, reaching 79.4 percent at 85 percent sparsity.</desc>
  <style>
    .label { fill: #27272a; font: 17px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: #52525b; font: 15px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #18181b; font: 600 25px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .grid { stroke: #d4d4d8; stroke-width: 1; }
    .axis { stroke: #71717a; stroke-width: 1.5; }
    .series { fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1200" height="700" fill="#ffffff" />

  <text x="100" y="35" class="title">Test accuracy across structured pruning levels</text>
  <text x="100" y="62" class="small">FashionMNIST · five mask-search seeds · 25,000 evaluations per method</text>

  <g class="small">
    <line x1="100" y1="88" x2="132" y2="88" stroke="#3a8a94" stroke-width="5" />
    <text x="140" y="94">GA · uniform</text>
    <line x1="300" y1="88" x2="332" y2="88" stroke="#d97c3d" stroke-width="4" />
    <text x="340" y="94">GA · two-point</text>
    <line x1="520" y1="88" x2="552" y2="88" stroke="#6b7280" stroke-width="3" stroke-dasharray="9 6" />
    <text x="560" y="94">Hill climbing</text>
    <line x1="720" y1="88" x2="752" y2="88" stroke="#9ca3af" stroke-width="3" stroke-dasharray="3 6" />
    <text x="760" y="94">Random search</text>
    <line x1="920" y1="88" x2="952" y2="88" stroke="#dcab6b" stroke-width="3" stroke-dasharray="12 5" />
    <text x="960" y="94">Magnitude</text>
  </g>

  <g>
    <line x1="100" y1="588" x2="1140" y2="588" class="grid" />
    <line x1="100" y1="460" x2="1140" y2="460" class="grid" />
    <line x1="100" y1="332" x2="1140" y2="332" class="grid" />
    <line x1="100" y1="204" x2="1140" y2="204" class="grid" />
    <line x1="100" y1="140" x2="1140" y2="140" class="grid" />
    <line x1="100" y1="620" x2="1140" y2="620" class="axis" />
    <line x1="100" y1="140" x2="100" y2="620" class="axis" />
  </g>

  <g class="small" text-anchor="end">
    <text x="86" y="594">20</text>
    <text x="86" y="466">40</text>
    <text x="86" y="338">60</text>
    <text x="86" y="210">80</text>
    <text x="86" y="146">90</text>
  </g>
  <g class="small" text-anchor="middle">
    <text x="100" y="648">30</text>
    <text x="446.7" y="648">50</text>
    <text x="793.3" y="648">70</text>
    <text x="1053.3" y="648">85</text>
    <text x="1140" y="648">90</text>
    <text x="620" y="682" class="label">Hidden neurons pruned (%)</text>
  </g>
  <text transform="translate(25 430) rotate(-90)" class="label">Test accuracy (%)</text>

  <line x1="100" y1="146.9" x2="1140" y2="146.9" stroke="#71717a" stroke-width="2" stroke-dasharray="5 7" />
  <text x="110" y="135" class="small">dense 88.92%</text>

  <path d="M100,149.3 L446.7,152.6 L793.3,158.8 L1053.3,207.8 L1140,294" class="series" stroke="#3a8a94" stroke-width="5" />
  <path d="M100,150.2 L446.7,154.8 L793.3,162.2 L1053.3,210.6 L1140,346.3" class="series" stroke="#d97c3d" stroke-width="4" />
  <path d="M100,151.8 L446.7,158.7 L793.3,180 L1053.3,264.5 L1140,371.8" class="series" stroke="#6b7280" stroke-width="3" stroke-dasharray="9 6" />
  <path d="M100,155.4 L446.7,171.6 L793.3,223.1 L1053.3,404.3 L1140,498.9" class="series" stroke="#9ca3af" stroke-width="3" stroke-dasharray="3 6" />
  <path d="M100,160.4 L446.7,219.2 L793.3,387.4 L1053.3,541.7 L1140,603.6" class="series" stroke="#dcab6b" stroke-width="3" stroke-dasharray="12 5" />

  <g fill="#3a8a94">
    <circle cx="100" cy="149.3" r="5" /><circle cx="446.7" cy="152.6" r="5" /><circle cx="793.3" cy="158.8" r="5" /><circle cx="1053.3" cy="207.8" r="7" /><circle cx="1140" cy="294" r="5" />
  </g>
  <g fill="#d97c3d">
    <rect x="96" y="146.2" width="8" height="8" /><rect x="442.7" y="150.8" width="8" height="8" /><rect x="789.3" y="158.2" width="8" height="8" /><rect x="1049.3" y="206.6" width="8" height="8" /><rect x="1136" y="342.3" width="8" height="8" />
  </g>
  <text x="1038" y="193" text-anchor="end" class="label">79.4%</text>
</svg>
