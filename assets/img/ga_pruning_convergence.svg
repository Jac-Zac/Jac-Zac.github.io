<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Search convergence at 85 percent neuron sparsity</title>
  <desc id="desc">Uniform and two-point genetic algorithms continue improving to about 80 percent validation accuracy, ahead of hill climbing and random search.</desc>
  <style>
    .label { fill: #27272a; font: 17px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: #52525b; font: 15px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #18181b; font: 600 25px Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .grid { stroke: #d4d4d8; stroke-width: 1; }
    .axis { stroke: #71717a; stroke-width: 1.5; }
    .series { fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <rect width="1200" height="700" fill="#ffffff" />

  <text x="100" y="35" class="title">Search convergence at 85% neuron sparsity</text>
  <text x="100" y="62" class="small">Best validation accuracy so far · curves averaged across five seeds</text>

  <g class="small">
    <line x1="100" y1="88" x2="132" y2="88" stroke="#3a8a94" stroke-width="5" />
    <text x="140" y="94">GA · uniform</text>
    <line x1="320" y1="88" x2="352" y2="88" stroke="#d97c3d" stroke-width="4" />
    <text x="360" y="94">GA · two-point</text>
    <line x1="560" y1="88" x2="592" y2="88" stroke="#6b7280" stroke-width="3" stroke-dasharray="9 6" />
    <text x="600" y="94">Hill climbing</text>
    <line x1="790" y1="88" x2="822" y2="88" stroke="#9ca3af" stroke-width="3" stroke-dasharray="3 6" />
    <text x="830" y="94">Random search</text>
  </g>

  <g>
    <line x1="100" y1="568.9" x2="1140" y2="568.9" class="grid" />
    <line x1="100" y1="466.8" x2="1140" y2="466.8" class="grid" />
    <line x1="100" y1="364.7" x2="1140" y2="364.7" class="grid" />
    <line x1="100" y1="262.6" x2="1140" y2="262.6" class="grid" />
    <line x1="100" y1="160.4" x2="1140" y2="160.4" class="grid" />
    <line x1="100" y1="620" x2="1140" y2="620" class="axis" />
    <line x1="100" y1="140" x2="100" y2="620" class="axis" />
  </g>

  <g class="small" text-anchor="end">
    <text x="86" y="575">40</text><text x="86" y="473">50</text><text x="86" y="371">60</text><text x="86" y="269">70</text><text x="86" y="166">80</text>
  </g>
  <g class="small" text-anchor="middle">
    <text x="100" y="648">1</text><text x="305" y="648">50</text><text x="514" y="648">100</text><text x="723" y="648">150</text><text x="931" y="648">200</text><text x="1140" y="648">250</text>
    <text x="620" y="682" class="label">Generation</text>
  </g>
  <text transform="translate(25 445) rotate(-90)" class="label">Best validation accuracy (%)</text>

  <path d="M100,596.6 L141.8,396.1 L183.5,305.7 L225.3,265.4 L267.1,231.9 L308.8,217.4 L350.6,207.8 L392.4,200 L434.1,195 L475.9,191.8 L517.7,187.7 L559.4,183.9 L601.2,182.8 L643,177.2 L684.7,172.8 L726.5,169.1 L768.3,166.1 L810,164.6 L851.8,162.7 L893.6,161.5 L935.3,160.6 L977.1,158.8 L1018.9,158.7 L1060.6,158 L1102.4,155.8 L1140,155.3" class="series" stroke="#3a8a94" stroke-width="5" />
  <path d="M100,596.6 L141.8,399.7 L183.5,336.8 L225.3,294.8 L267.1,260 L308.8,246.4 L350.6,228.5 L392.4,217.1 L434.1,205.2 L475.9,197.4 L517.7,192.6 L559.4,190.4 L601.2,186.6 L643,183.4 L684.7,181.4 L726.5,178.9 L768.3,177.4 L810,175.8 L851.8,174.7 L893.6,173.6 L935.3,170.1 L977.1,163.5 L1018.9,161.2 L1060.6,158.9 L1102.4,158.8 L1140,158.4" class="series" stroke="#d97c3d" stroke-width="4" />
  <path d="M100,580 L141.8,533.3 L183.5,487.9 L225.3,470.4 L267.1,453.6 L308.8,438.7 L350.6,406.6 L392.4,392.7 L434.1,388.2 L475.9,382.2 L517.7,371 L559.4,359.4 L601.2,351.3 L643,339.6 L684.7,329.9 L726.5,319.3 L768.3,310.8 L810,306.9 L851.8,300.6 L893.6,294.4 L935.3,282.2 L977.1,277.6 L1018.9,272.9 L1060.6,264.2 L1102.4,254.1 L1140,251.5" class="series" stroke="#6b7280" stroke-width="3" stroke-dasharray="9 6" />
  <path d="M100,596.6 L141.8,552.3 L183.5,538.3 L225.3,504.8 L267.1,504.4 L308.8,504.1 L350.6,504.1 L392.4,504.1 L434.1,500.7 L475.9,486.7 L517.7,486.7 L559.4,486.7 L601.2,486.7 L643,486.7 L684.7,485.9 L726.5,485.9 L768.3,484.5 L810,478.9 L851.8,477.3 L893.6,477.3 L935.3,477.3 L977.1,477.3 L1018.9,477.3 L1060.6,476.5 L1102.4,476.5 L1140,476.5" class="series" stroke="#9ca3af" stroke-width="3" stroke-dasharray="3 6" />

  <circle cx="1140" cy="155.3" r="7" fill="#3a8a94" />
  <text x="1125" y="142" text-anchor="end" class="label">80.5%</text>
</svg>
